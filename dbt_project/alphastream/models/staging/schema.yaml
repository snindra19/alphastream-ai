version: 2

models:
  - name: stg_news_headlines
    description: "Cleaned and deduplicated news headlines from NewsAPI"
    columns:
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
      - name: title
        description: "Article headline"
        tests:
          - not_null
      - name: url
        description: "Article URL"
        tests:
          - not_null